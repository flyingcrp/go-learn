# 跨平台 Air 配置（合并版）
root = "."
tmp_dir = "tmp"
testdata_dir = "testdata"

[build]
  entrypoint = "tmp/main{{.Ext}}"             # 自动加 .exe
  cmd = "go build -o tmp/main{{.Ext}} ./app"   # 自动加 .exe
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "testdata"]
  include_ext = ["go", "tpl", "tmpl", "html"]
  log = "tmp/build-errors.log"

[env]
  AIR_MODE = "true"
  CGO_ENABLED = "0"

[color]
  build = "yellow"
  runner = "green"
  watcher = "cyan"

[misc]
  clean_on_exit = false
