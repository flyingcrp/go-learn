root = "."
tmp_dir = "tmp" 

env_files = [".env"]

[build]
  entrypoint = "tmp/main"
  cmd = "go build -o tmp/main ./cmd/server"
  delay = 1000
  kill_delay = 500
  exclude_dir = ["assets", "tmp", "vendor"]
  include_ext = ["go", "tpl", "tmpl", "html"]
  log = "tmp/build-errors.log"
  send_interrupt = true

[build.windows]
  cmd = "go build -o ./tmp/main.exe ."
  bin = "tmp\\main.exe"
  entrypoint = ["tmp\\main.exe"]

[color]
  build = "yellow"
  runner = "green"
  watcher = "cyan"

[screen]
  clear_on_rebuild = true
  keep_scroll = true

[misc]
  clean_on_exit = true
